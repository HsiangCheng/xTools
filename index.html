<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --card-radius: 16px;
            --gap: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f8;
            min-height: 100vh;
            color: #333;
        }

        /* ===== Header ===== */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px 20px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.07);
            border-radius: 50%;
            top: -80px;
            left: -60px;
        }

        header::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.07);
            border-radius: 50%;
            bottom: -60px;
            right: 30px;
        }

        header h1 {
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        header p {
            margin-top: 10px;
            font-size: clamp(13px, 2vw, 16px);
            opacity: 0.85;
            position: relative;
            z-index: 1;
        }

        /* ===== Search ===== */
        .search-wrap {
            display: flex;
            justify-content: center;
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }

        .search-wrap input {
            width: min(400px, 90%);
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        /* ===== Main ===== */
        main {
            max-width: 1100px;
            margin: 40px auto 0;
            padding: 0 var(--gap) 60px;
            position: relative;
            z-index: 2;
        }

        /* ===== Category ===== */
        .category {
            background: white;
            border-radius: var(--card-radius);
            padding: 24px;
            margin-bottom: var(--gap);
            box-shadow: 0 2px 16px rgba(100, 100, 150, 0.08);
        }

        .category-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 16px;
            padding-left: 4px;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }

        /* ===== Grid ===== */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--gap);
        }

        /* ===== Tool Card ===== */
        .tool-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px 16px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            border: 1.5px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .tool-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(100, 100, 200, 0.15);
            border-color: var(--primary);
            background: white;
        }

        .tool-card:active {
            transform: translateY(-1px);
        }

        .tool-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .tool-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tool-name {
            font-size: 15px;
            font-weight: 600;
            color: #222;
        }

        .tool-desc {
            font-size: 12px;
            color: #999;
            line-height: 1.5;
        }

        .tool-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: #eef0ff;
            color: var(--primary);
            font-weight: 500;
        }

        /* ===== Hidden by search ===== */
        .tool-card.hidden {
            display: none;
        }

        /* ===== Empty placeholder ===== */
        .empty-placeholder {
            color: #ccc;
            font-size: 13px;
            padding: 10px 4px;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #bbb;
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            header {
                padding: 30px 16px 70px;
            }

            main {
                margin-top: -30px;
                padding: 0 12px 40px;
            }

            .category {
                padding: 16px;
            }

            .tools-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .tool-card {
                padding: 14px 12px;
            }

            .tool-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
                border-radius: 10px;
            }

            .tool-name {
                font-size: 13px;
            }

            .tool-desc {
                display: none;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .tools-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }
    </style>
</head>
<body>

    <div class="search-wrap">

</main>

<footer>
    个人工具箱 · 持续建设中
</footer>

<script>
    function filterTools() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        const cards = document.querySelectorAll('.tool-card');

        cards.forEach(card => {
            const searchText = (card.dataset.name || '') + card.textContent;
            const match = searchText.toLowerCase().includes(keyword);
            card.classList.toggle('hidden', !match);
        });
    }
</script>
